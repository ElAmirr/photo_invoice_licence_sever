services:
  - type: web
    name: shootix-licence-server
    env: node
    plan: free
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shootix_db
          property: connectionString
      - key: ADMIN_SECRET
        generateValue: true
      - key: PORT
        value: 3000
